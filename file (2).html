<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FF Tournaments</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="[fonts.googleapis.com](https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Orbitron:wght@700&display=swap)" rel="stylesheet">
    <link rel="stylesheet" href="[cdnjs.cloudflare.com](https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css)">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i></a>
                <div class="logo">
                    <i class="fas fa-fire"></i>
                    <span>FF TOURNAMENTS</span>
                </div>
            </div>
            
            <h2>Welcome Back!</h2>
            <p class="auth-subtitle">Login to join tournaments</p>
            
            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="mobile">
                        <i class="fas fa-mobile-alt"></i> Mobile Number
                    </label>
                    <div class="phone-input">
                        <span class="country-code">+91</span>
                        <input type="tel" id="mobile" name="mobile" placeholder="Enter your mobile number" 
                               pattern="[0-9]{10}" maxlength="10" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i> Password
                    </label>
                    <div class="password-input">
                        <input type="password" id="password" name="password" 
                               placeholder="Enter your password" required>
                        <button type="button" class="toggle-password">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                
                <div class="form-group checkbox-group">
                    <input type="checkbox" id="remember">
                    <label for="remember">Remember me</label>
                    <a href="#" class="forgot-link">Forgot Password?</a>
                </div>
                
                <button type="submit" class="btn btn-primary btn-full">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>
            
            <div class="auth-footer">
                <p>Don't have an account? <a href="signup.html">Sign up here</a></p>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const mobile = document.getElementById('mobile').value;
            const password = document.getElementById('password').value;
            
            const storedUser = JSON.parse(localStorage.getItem('ffUser'));
            
            if (storedUser && storedUser.mobile === mobile && storedUser.password === password) {
                localStorage.setItem('isLoggedIn', 'true');
                showToast('Login successful!', 'success');
                
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);
            } else {
                showToast('Invalid mobile number or password!', 'error');
            }
        });
    </script>
</body>
</html>
